name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - run: yarn install --frozen-lockfile

      - name: Test convert
        run: yarn --cwd packages/convert test

      - name: Test app
        run: yarn --cwd packages/app test

      - name: Build
        run: yarn build
